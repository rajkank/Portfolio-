<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Raj Sudhir Kank — AI Engineer specializing in Agentic AI, Generative AI, and Machine Learning. Mumbai, India."
    />
    <title>Raj Sudhir Kank | AI Engineer</title>
    <!-- Loader clock starts before any bundle — used for minimum display time -->
    <script>
      window.__PORTFOLIO_LOADER_T0__ = performance.now()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Ensure scrollbars are hidden before JS/CSS bundle (Chromium on Windows) -->
    <style>
      @keyframes initial-site-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0a0a;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scrollbar-color: transparent transparent;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        width: 0 !important;
        height: 0 !important;
        display: none !important;
      }
    </style>
  </head>
  <body>
    <!-- Shown on first paint until React PageLoader takes over and later dismisses -->
    <div
      id="initial-site-loader"
      aria-hidden="true"
      style="
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.75rem;
        background: #0a0a0a;
        font-family: Inter, system-ui, sans-serif;
      "
    >
      <div
        style="
          pointer-events: none;
          position: absolute;
          inset: 0;
          opacity: 0.14;
          background: radial-gradient(
            ellipse 85% 55% at 50% -15%,
            #10b981 0%,
            transparent 58%
          );
        "
      ></div>
      <div style="position: relative; width: 64px; height: 64px">
        <span
          style="
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            border: 2px solid rgba(39, 39, 42, 0.9);
          "
        ></span>
        <span
          style="
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            border: 2px solid transparent;
            border-top-color: #34d399;
            border-right-color: rgba(52, 211, 153, 0.45);
            box-shadow: 0 0 24px rgba(52, 211, 153, 0.25);
            animation: initial-site-loader-spin 0.85s linear infinite;
          "
        ></span>
      </div>
      <div style="position: relative; text-align: center; max-width: 90vw">
        <p
          style="
            margin: 0;
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: clamp(1.25rem, 4vw, 1.75rem);
            color: #fafafa;
          "
        >
          Raj Sudhir Kank
        </p>
        <p
          style="
            margin: 0.75rem 0 0;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #71717a;
          "
        >
          Loading portfolio
        </p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
